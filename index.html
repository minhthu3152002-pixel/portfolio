<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minh Thu — Marketing Portfolio</title>
<meta name="description" content="Marketing portfolio of Nguyen Thi Minh Thu: integrated campaigns, copywriting, social media, events and brand management.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0f1014; --surface:#16181f; --line:#262a36;
    --text:#eef0f4; --muted:#9aa1b0; --accent:#ff7a45;
    --radius:22px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:'Be Vietnam Pro',sans-serif;font-weight:300;line-height:1.7;-webkit-font-smoothing:antialiased}
  h1,h2,h3,h4{font-family:'Bricolage Grotesque',sans-serif;line-height:1.12}
  img{display:block;max-width:100%}
  a{color:inherit;text-decoration:none}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  .wrap{max-width:1120px;margin:0 auto;padding:0 24px}
  .eyebrow{font-size:.76rem;letter-spacing:.2em;text-transform:uppercase;font-weight:500;margin-bottom:14px;color:var(--accent)}

  /* NAV */
  nav{position:sticky;top:0;z-index:60;background:rgba(15,16,20,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
  .logo{font-family:'Bricolage Grotesque';font-weight:800;font-size:1.05rem;letter-spacing:.02em}
  .logo span{color:var(--accent)}
  .nav-links{display:flex;gap:26px;font-size:.88rem;color:var(--muted)}
  .nav-links a:hover{color:var(--text)}

  /* HERO */
  .hero{padding:110px 0 90px;position:relative;overflow:hidden}
  .hero::before{content:"";position:absolute;top:-220px;right:-160px;width:600px;height:600px;background:radial-gradient(circle,rgba(255,122,69,.13),transparent 65%);pointer-events:none}
  .hero h1{font-size:clamp(2.5rem,6.4vw,4.4rem);font-weight:800;letter-spacing:-.02em;margin-bottom:22px;max-width:880px}
  .hero h1 em{font-style:normal;background:linear-gradient(92deg,#ff7a45,#c94fff);-webkit-background-clip:text;background-clip:text;color:transparent}
  .hero p{max-width:620px;color:var(--muted);font-size:1.02rem}

  /* PROJECT BLOCKS (home) */
  .pblock{padding:88px 0;border-radius:36px;margin:18px 12px;position:relative;overflow:hidden;cursor:pointer;transition:transform .3s ease}
  .pblock:hover{transform:translateY(-4px)}
  .pgrid{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center}
  .pnum{font-size:.78rem;letter-spacing:.22em;font-weight:500;opacity:.85;margin-bottom:26px}
  .pblock h2{font-size:clamp(1.9rem,4.2vw,3rem);font-weight:800;letter-spacing:-.01em;margin-bottom:20px;text-transform:uppercase}
  .pblock .pdesc{opacity:.88;font-size:1rem;max-width:520px;margin-bottom:30px}
  .tags{display:flex;flex-wrap:wrap;gap:10px}
  .tag{border:1px solid currentColor;border-radius:999px;padding:7px 18px;font-size:.83rem;font-weight:500;opacity:.9}
  .pimg{position:relative}
  .pimg img{border-radius:16px;transform:rotate(2.5deg);box-shadow:0 24px 60px rgba(0,0,0,.45);transition:transform .4s ease}
  .pblock:hover .pimg img{transform:rotate(0deg) scale(1.02)}
  .parrow{position:absolute;right:18px;bottom:14px;width:52px;height:52px;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:1.2rem}
  @media(max-width:820px){.pgrid{grid-template-columns:1fr;gap:34px}.pblock{padding:60px 0}}

  /* DETAIL VIEW */
  .dhero{padding:80px 0 70px;border-radius:0 0 40px 40px}
  .back{display:inline-flex;align-items:center;gap:8px;font-size:.9rem;opacity:.85;margin-bottom:40px;font-weight:500}
  .back:hover{opacity:1}
  .dhero .badge{display:inline-block;background:rgba(0,0,0,.4);border-radius:999px;padding:8px 20px;font-size:.75rem;letter-spacing:.16em;font-weight:600;text-transform:uppercase;margin-bottom:22px}
  .dhero h1{font-size:clamp(2.1rem,5vw,3.5rem);font-weight:800;text-transform:uppercase;letter-spacing:-.01em;max-width:840px;margin-bottom:20px}
  .dhero p{max-width:640px;opacity:.9;margin-bottom:28px}

  .dbody{display:grid;grid-template-columns:250px 1fr;gap:60px;padding:80px 0}
  .side h4{font-size:.78rem;letter-spacing:.2em;color:var(--muted);font-weight:600;margin:0 0 16px;text-transform:uppercase}
  .side .tags{margin-bottom:36px}
  .side .tag{border-color:var(--line);color:var(--text)}
  .main section{margin-bottom:64px}
  .main h3{font-size:1.45rem;font-weight:800;letter-spacing:.04em;margin-bottom:22px;text-transform:uppercase}
  .main ul{list-style:none}
  .main li{padding-left:26px;position:relative;margin-bottom:14px;color:#c6cbd6}
  .main li::before{content:"";position:absolute;left:0;top:.62em;width:9px;height:9px;border-radius:50%;background:var(--pc,var(--accent))}
  .main li b{color:var(--text);font-weight:600}
  .stat-row{display:flex;gap:40px;flex-wrap:wrap;margin-top:8px}
  .stat b{font-family:'Bricolage Grotesque';font-weight:800;font-size:2.2rem;display:block;color:var(--pc,var(--accent))}
  .stat small{color:var(--muted)}
  .steps{display:flex;flex-direction:column;gap:16px}
  .step{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:26px 28px;display:flex;gap:22px}
  .step .n{flex:none;width:46px;height:46px;border-radius:50%;background:var(--pc,var(--accent));color:#0f1014;font-family:'Bricolage Grotesque';font-weight:800;display:flex;align-items:center;justify-content:center}
  .step h5{font-family:'Bricolage Grotesque';font-size:1.02rem;font-weight:600;margin-bottom:6px}
  .step p{color:var(--muted);font-size:.93rem}
  .gallery{display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .gallery img{border-radius:14px;border:1px solid var(--line);width:100%;transition:transform .3s ease}
  .gallery img:hover{transform:scale(1.02)}
  .gallery figure.full{grid-column:1/-1}
  .gallery figcaption{font-size:.8rem;color:var(--muted);margin-top:8px;text-align:center}
  @media(max-width:820px){.dbody{grid-template-columns:1fr;gap:30px}.gallery{grid-template-columns:1fr}}

  /* CONTACT */
  footer{border-top:1px solid var(--line);padding:80px 0;text-align:center}
  footer h2{font-size:clamp(1.8rem,4vw,2.6rem);font-weight:800;margin-bottom:16px}
  footer p{color:var(--muted);margin-bottom:26px}
  .btn{display:inline-block;padding:14px 30px;border-radius:999px;background:var(--accent);color:#1a0d05;font-weight:600;font-size:.95rem;transition:transform .2s,box-shadow .2s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(255,122,69,.35)}
  .socials{display:flex;gap:22px;justify-content:center;margin-top:26px;color:var(--muted);font-size:.9rem;flex-wrap:wrap}
  .socials a:hover{color:var(--accent)}
  .copy{margin-top:40px;color:#565c6b;font-size:.8rem}

  /* reveal on scroll */
  .rv{opacity:0;transform:translateY(26px);transition:opacity .7s ease,transform .7s ease}
  .rv.in{opacity:1;transform:none}
  @media(prefers-reduced-motion:reduce){.rv{opacity:1;transform:none;transition:none}}
</style>
</head>

        <h1>${p.title}</h1>

      </div>
    </header>
    <div class="wrap dbody" style="--pc:${p.pc}">

        </section>
        <section class="rv"><h3>Gallery</h3>
          <div class="gallery">${p.gallery.map(g=>`<figure${g[2]?' class="full"':''}><img src="${g[0]}" alt="${g[1]}" loading="lazy"><figcaption>${g[1]}</figcaption></figure>`).join('')}</div>
        </section>
        <a class="back" href="#/" style="color:var(--pc)">← Back to all projects</a>
      </div>
    </div>`;
  scrollTo(0,0);
  reveal();
}

function reveal(){
  const io = new IntersectionObserver(es=>es.forEach(e=>{
    if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}
  }),{threshold:.12});
  document.querySelectorAll('.rv').forEach(el=>io.observe(el));
}

function route(){
  const h = location.hash;
  const m = h.match(/^#\/project\/(.+)$/);
  if(m){
    const p = projects.find(x=>x.id===m[1]);
    if(p){detailView(p);return;}
  }
  if(h==='#projects'){ if(!document.getElementById('projects')) homeView(); document.getElementById('projects')?.scrollIntoView({behavior:'smooth'}); return; }
  if(h==='#contact'){ if(!document.getElementById('projects')) homeView(); return; }
  homeView();
}
addEventListener('hashchange',route);
route();
